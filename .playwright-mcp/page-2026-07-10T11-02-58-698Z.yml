                  - 'img "AI 티나는 글... 너무 지겨워 >< AI 도움 받아서 글 쓰고, 분명 내가 직접 확인하고 고치기까지 했는데— \"이거 AI가 썼지\" 소리, 진짜 한두 번 들은 게 아니야. 몇 번을 고쳐도 손가락만 아프고, 진짜 티 안 나는지는 나도 확신이 안 서더라고. 그래서 위키피디아, 카이스트, 논문까지 다 뒤졌어. AI 티나는 표현 — 영어 76개, 한국어 26개, 합쳐서 무려 102개. 이걸 다 외울 수는 없어서, 그냥 클로드 스킬로 만들어버렸어. 업로드만 하면 끝. 쓰는 법은 3가지: 쓴 글 고치기 — \"사람 냄새나게 해줘\" AI 냄새 확인 — \"몇 프로 AI야?\" 자동 체크 — 말 안 해도 알아서 체크함 궁금하면 댓글에 ''인간미'' 남겨. DM으로 스킬 파일 바로 보내줄게. #클로드 #AI" [ref=f19e1045]'
