                  - 'img "그림 완전 못그리는 사람도 이런 손 일러스트 만들수 있다면? 이 일러스트 만드는 스킬, 해외에서 크리에이터들이 다들 추천하는데, 깃허브에서 무려 6.4K ★ 받았어!! 긴 글이나 강의 노트나 기사나 내용을 더 쏙쏙 들어오게 할 다이어그램이 귀엽기까지 하면 너무 좋잖아? 이번에 월드컵 32강 진출 못한거 너무 속상한데, 그거 관련 조사시키고 간략하게 결과 요약한 일러스트를 만들어봤어. 심지어 내 캐릭터를 넣어서 만들수 있으니까 필요한 사람은 ''일러스트 스킬'' 댓글에 남겨줘! 스킬 링크와 쓰는 방법 가이드 보내줄게~ #Claudeskill #handdrawn #AIskill" [ref=f19e1057]'
