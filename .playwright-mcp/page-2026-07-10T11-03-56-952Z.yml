                  - 'img "아무 댓글 하나만 남겨주세요.💬 이 영상 만들면서 사용했던 프롬프트와 활용 가이드 노션 문서를 DM으로 보내드리겠습니다.📩 이 영상, 편집자 없이 만들어졌습니다. 믿기 힘드시겠지만 영상 속 모션 그래픽 전부... 제가 만든 게 아니라 AI가 직접 만들었어요. \"저런 건 영상 편집 몇 년은 배워야 하는 거 아니야?\" 아니었어요. 프롬프트 붙여넣기만으로 끝났습니다. 마무리 편집만 제가 했구요. 비밀은 구글 Omni. 텍스트로 명령하면 영상을 ''생성''해주는 구글의 AI인데, 내 원본 영상에 모션 그래픽을 입히는 것까지 가능합니다. 포인트는 단 하나. 어떤 프롬프트를 넣느냐입니다. 이 영상 만들면서 사용했던 프롬프트와 꼼꼼한 활용 가이드 보내드리겠습니다. 저를 팔로우 해주시고 아무 댓글 하나만 남겨주세요. 자동 DM 바로 전송됩니다. #AI영상편집 #모션그래픽 #구글Omni #영상편집 #googleomni 구글 Omni 사용해 보신 적 있으세요?" [ref=f27e417]'
