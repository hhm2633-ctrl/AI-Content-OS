                - link [ref=f69e334] [cursor=pointer]:
                  - /url: /jwon.ig/reel/DacdZUrz7Si/
                  - 'img "AI를 잘 쓰는 사람은 하나만 고집하지 않습니다. 만들고 실행할 땐 ChatGPT 긴 글을 정리하고 다듬을 땐 Claude 자료를 찾고 출처를 확인할 땐 Perplexity 구글 문서·메일·드라이브 안에서 일할 땐 Gemini 도구마다 잘하는 일이 다릅니다. 일에 맞춰 AI를 바꾸면 결과물의 속도와 퀄리티도 달라집니다. 나중에 또 볼 수 있도록 저장해두세요. 더 자세한 AI 활용법이 필요하시면 팔로우하고 AI 라고 남겨주세요. #ChatGPT #Claude #Perplexity #Gemini #워프센스" [ref=f69e337]'
