                  - 'img "실제로 해외에서 클로드를 자주 비하하던 유저가 차단을 당한 사례가 있었습니다. 차단 당한 유저는 아래와 같이 비꼬는 말을 자주 했다고 합니다. \"너 미쳤어?\" \"네 뇌는 클라우드에 있어, 아니면 무릎에 있어?\" \"오늘 일할 기분이 아냐?\" \"그따위로 생각하지마\" \"너 또 추측하고 있냐?\" AI를 인간으로 대우해서도 안 되겠지만 그렇다고 너무 비하도 하면 안 되는 것 같습니다. AI 자주 쓰신다면 이 내용은 꼭 저장해두세요. #클로드 #Claude #AI활용 #AI프롬프트 #워프센스" [ref=f69e344]'
