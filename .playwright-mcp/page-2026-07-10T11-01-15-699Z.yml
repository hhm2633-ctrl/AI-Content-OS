                  - link [ref=f17e1031] [cursor=pointer]:
                    - /url: /moongi_adventures/reel/Dalx6QIIYkx/
                    - 'img "SNS 아싸였던 내가 어쩌다 인스타 만명을 찍었을까? 🤔 작년까지 난 진짜 SNS 안 하던 사람이었어. 평범한 회사원, 번아웃, 그러다 뭐라도 하고 싶어서 시작한 게 인스타툰. 근데 4개월을 매일 4시간씩 매일 그렸는데… 400명이더라 😅 거기서 포기하지 않았어! 진짜 사람들이 필요한게 뭘까? 고민해봤어. 그러다가 내가 AI 배우면서 알게 된 걸 하나씩 나누기 시작했고, 많은 사람들이 유용하게 쓰기 시작하면서 점점 계정이 알려졌어! 결론? 열심히만 해선 안 되더라고. 내 계정이 색깔과 목적이 뚜렸해야했고, 나름 전략이 있어야 했어. 나는 만이 되기도 전부터 내 계정에 맞는 협업 요청과 강의가 여러개 들어오기 시작했어! 너무 신기했던거 있지?! 지금까지 함께해줘서 고맙고, 앞으로도 함께 해줄거지?! 그래서 준비했어 🎁 내가 실제로 바이럴 글 584개를 모아서 분석한 「바이럴 훅 & 패턴 플레이북」: ✅ 실제로 터진 훅 6가지 패턴 (조회수까지 공개) ✅ 바로 갖다 쓰는 훅 템플릿 50개 & 실제 10만 이상 터진 컨텐츠 훅 50개 ✅ 지금 뜨는 신호 정리 👉 댓글에 ''선물'' 남겨주면 DM으로 바로 보내줄게 📩 앞으로 더 좋은 컨텐츠 만들어볼게! 이 영상은 @like.craisee 를 사용해서 이미지와 영상 모두 만들었어!! #인스타그램 #AI #콘텐츠크리에이터 #퍼스널브랜딩" [ref=f17e1034]'
