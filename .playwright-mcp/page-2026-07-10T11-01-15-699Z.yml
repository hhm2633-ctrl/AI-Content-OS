                    - 'img "코딩 쥐뿔 몰라도 AI 직원 만드는 법. 컴맹도 쉽게 시작할수 있는 클로드 왕초보 시작 가이드!! 터미널이 뭔지도 몰랐던 나도 지금은 Claude Code로 자동화 시스템 돌리고 있어. 삶이 너무 윤택해져서... 안하고 있는 사람들에겐 꼭 꼬옥좀 하라고 하고 싶어! 진짜 바뀐 건 딱 하나 — 채팅 말고 터미널에 claude 쳐본 것. 슬라이드 넘겨봐. 설치부터 CLAUDE.md 세팅까지 한 번에 정리했어. 자세한 가이드 + 엄선한 스킬 링크 원하면 댓글에 클로드코드 남겨줘 👇 #클로드코드 #claudecode #AI업무자동화 #AI툴 #생산성" [ref=f17e1028]'
                    - generic:
