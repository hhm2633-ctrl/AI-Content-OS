                    - 'img "여름 느낌 물씬한 트렌디한 폰배경 만들어봤어~~~ 내 반려동물 사진만 넣어서! 이건 동물뿐만 아니라 제품, 사람도 다 넣어서 만들수 있어 ㅎㅎ 손으로 그린듯한 디지털 아트에 팝컬러를 더하고 손글씨를 넣어 통통 튀는 매력의 포스터가 완성되었어. 폰배경, 액자, 컴퓨터 바탕 화면 등등 어디에도 써도 이쁠것 같아. 만들어보고 싶지 않아? 프롬프트 베끼고 수정하고 하는거 귀찮자너. 그래서 아예 스킬로 만들었어. 한번 클로드에 업로드 해놓으면 대화할때 반려동물 포스터, 폰배경 만들어줘라고만 해도 알아서 프롬프트 써줘!!! 내 원하는 컨셉으로 다양하게 만들때 참 좋겠지? 지피티나 제미나이에서 쓰고 싶으면 파일 내용을 붙여서 쓰면돼. 자세한 벙법까지 이번엔 영상으로 남겼으니까 꼭 써보길~~''배경화면'' 댓글 남겨주면 파일 보내줄게. 이쁜거 많이 만들어보길! #반려동물 #Claude #aiart #클로드" [ref=f17e1053]'
