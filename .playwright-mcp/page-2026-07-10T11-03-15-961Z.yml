                      - text: 내일 페이블(역대급 클로드) 무료로 쓰던 거 끝나잖아. 근데 그거 아까워할 필요 없더라.누가 클로드·챗지피티 같은 AI들이 대답하기 전에 몰래 읽는 '숨은 지시문'을 깃허브에 통째로 털어놨거든. 별만 4만 5천 개 넘음. 근데 진짜 터진 건, 아직 정식으로 안 풀린 최신 모델 '페이블'의 지시문까지 올라온 거야.핵심은 이거. 페이블이 똑똑했던 이유의 절반은 '머리'가 아니라 '일하는 방식'이었어. 그 방식(=지시문)만 복사해서 지금 쓰는 아무 모델한테 얹으면, 싼 모델도 페이블처럼 굴러. 사람들이 '페이블 모드'라고 부르더라.방법도 쉬워:깃허브에서 파일 복사claude.ai 프로젝트 '지침'칸에 붙여넣기모델 아무거나 + effort는 적당히 (너무 세게 X)그 안에서 평소처럼 대화. 끝.솔직히 이건 앤트로픽 공식 검증본은 아냐. 근데 수많은 사람이 직접 써보고 '진짜 되네' 하고 성능 입증한 방법이야. 맹신은 말고, 그래도 무시하긴 아까운 치트키.📌 자세한 설치법 + 리포 링크 궁금하면 댓글에 '페이블' 남겨. DM으로 바로 보내줄게. 저장해두면 내일 무료 끝나도 페이블 감성 안 잃어.
